name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build:
          - linux-x64
          - linux-arm64
          - macos-arm64
          - windows-x64
          - windows-arm64
        include:
          - build: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - build: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - build: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - build: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - build: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
    - uses: actions/checkout@v4

    - name: Install llvm-tools
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-llvm-cov,cargo-nextest

    - name: Run tests
      run: |
        cargo llvm-cov nextest
        cargo llvm-cov report --cobertura --output-path target/llvm-cov-target/cobertura.xml

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: SF-Zhou/lockmap
        files: target/llvm-cov-target/cobertura.xml

    - name: Upload test results to Codecov
      uses: codecov/codecov-action@v5
      with:
        report_type: test_results
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: SF-Zhou/lockmap
        files: target/nextest/default/junit.xml

  miri:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nightly toolchain with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Run Miri tests
        run: cargo miri test lockmap::tests
